<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meadow Survivor - Smooth Active World</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Orbitron', sans-serif; background: #87ceeb; user-select: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hud { position: absolute; padding: 15px; pointer-events: auto; background: rgba(255,255,255,0.9); border: 2px solid #2d5a27; border-radius: 12px; color: #2d5a27; }
        .top-left { top: 20px; left: 20px; }
        #hp-bar { width: 200px; height: 12px; background: #ddd; border: 1px solid #2d5a27; margin-top: 5px; border-radius: 10px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4b2b, #ff416c); transition: 0.1s; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; }
        
        #menu-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        .weapon-card { background: rgba(255,255,255,0.1); border: 2px solid #00f2ff; padding: 20px; margin: 10px; cursor: pointer; border-radius: 10px; transition: 0.3s; width: 250px; text-align: center; color: white; }
        .weapon-card:hover { background: #00f2ff; color: black; box-shadow: 0 0 20px #00f2ff; }
        
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border: 4px solid #ff416c; text-align: center; display: none; pointer-events: auto; border-radius: 20px; }
        button { background: #2d5a27; border: none; color: white; padding: 12px 25px; font-family: 'Orbitron'; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .instruction { position: absolute; bottom: 20px; right: 20px; font-size: 11px; color: #2d5a27; opacity: 0.8; font-weight: bold; background: rgba(255,255,255,0.7); padding: 5px 10px; border-radius: 5px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- หน้าจอเลือกอาวุธเริ่มต้น -->
    <div id="menu-screen">
        <h1 style="color: #00f2ff; letter-spacing: 3px; margin-bottom: 30px;">CHOOSE YOUR WEAPON</h1>
        <div style="display: flex; flex-wrap: wrap; justify-content: center;">
            <div class="weapon-card" onclick="selectWeapon('melee')">
                <h2>⚔️ MELEE (มีด)</h2>
                <p>โจมตีระยะใกล้แบบกวาด ดาเมจสูงมาก</p>
            </div>
            <div class="weapon-card" onclick="selectWeapon('pistol')">
                <h2>🔫 PISTOL (ปืนพก)</h2>
                <p>ยิงกระสุนพลังงานจากระยะปลอดภัย</p>
            </div>
            <div class="weapon-card" onclick="selectWeapon('companion')">
                <h2>🤖 COMPANION (โดรน)</h2>
                <p>โดรนจิ๋วช่วยบินติดตามและยิงออโต้</p>
            </div>
        </div>
    </div>

    <div id="ui-layer">
        <div class="hud top-left">
            <div style="font-weight: bold; font-size: 11px;">LOADOUT: [<span id="weapon-name" style="color:#ff416c">NONE</span>]</div>
            <div id="hp-bar"><div id="hp-fill"></div></div>
            <div style="margin-top:10px; font-size: 18px; font-weight: bold;">🪙 <span id="coin-val">0</span></div>
            <div style="font-size: 10px; margin-top:5px; opacity: 0.7;">SURVIVORS ONLINE: <span id="online-val">1</span></div>
        </div>
        
        <div id="game-over" class="overlay">
            <h1 style="color:#ff416c; margin-top:0;">LINK BROKEN</h1>
            <button onclick="location.reload()">RESPAWN</button>
        </div>
        <div class="instruction">คลิกซ้าย: โจมตี | คลิกขวาค้าง+ลาก: หมุนกล้อง | WASD: เคลื่อนที่</div>
    </div>

    <div id="joystick-zone"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyC1SLWvio-oYibt4pzY8xVZRErHAbMLqbk",
            authDomain: "ssr-zombie.firebaseapp.com",
            projectId: "ssr-zombie",
            storageBucket: "ssr-zombie.firebasestorage.app",
            messagingSenderId: "675922375054",
            appId: "1:675922375054:web:660c59fdf774f1e94c74df",
            databaseURL: "https://ssr-zombie-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const PLAYER_ID = "P_" + Math.floor(Math.random() * 9999);
        const MODELS = {
            player: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
            zombie: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Soldier.glb'
        };

        let scene, camera, renderer, player;
        let playerMixer, playerActions = {}, currentWeapon = 'melee';
        let zombieBase, zombieAnims, isReady = false;
        let otherPlayers = {}, zombies = [], bullets = [];
        let moveVec = new THREE.Vector3();
        let stats = { hp: 100, money: 0, speed: 12, isAttacking: false };
        let lastShot = 0;

        // Companion
        let companion, companionMixer, companionAction;

        // ** สร้างระบบเวลา (Clock) ไว้ระดับบนสุดเพื่อให้พร้อมใช้งานเสมอ **
        const clock = new THREE.Clock();

        window.selectWeapon = function(type) {
            currentWeapon = type;
            document.getElementById('weapon-name').innerText = type.toUpperCase();
            document.getElementById('menu-screen').style.display = 'none';
            init();
        }

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa0cfec);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // ปรับปรุงระบบกล้อง OrbitControls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2.2;
            
            // คลิกซ้ายโจมตี / คลิกขวาหมุนมุมกล้องรอบตัว
            controls.mouseButtons = {
                LEFT: THREE.MOUSE.NONE, 
                MIDDLE: THREE.MOUSE.DOLLY,
                RIGHT: THREE.MOUSE.ROTATE 
            };

            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(30, 80, 30);
            sun.castShadow = true;
            scene.add(sun);

            // Ground
            const grass = new THREE.Mesh(
                new THREE.PlaneGeometry(1000, 1000),
                new THREE.MeshLambertMaterial({ color: 0x4f7942 })
            );
            grass.rotation.x = -Math.PI / 2;
            grass.receiveShadow = true;
            scene.add(grass);

            const loader = new GLTFLoader();

            // Load Zombie Base
            const zGltf = await loader.loadAsync(MODELS.zombie);
            zombieBase = zGltf.scene;
            zombieAnims = zGltf.animations;

            // Load Player
            const pGltf = await loader.loadAsync(MODELS.player);
            player = pGltf.scene;
            player.scale.set(0.4, 0.4, 0.4);
            player.traverse(n => { if(n.isMesh) n.castShadow = true; });
            scene.add(player);

            playerMixer = new THREE.AnimationMixer(player);
            pGltf.animations.forEach(a => {
                if(a.name === 'Idle') playerActions.idle = playerMixer.clipAction(a);
                if(a.name === 'Running') playerActions.run = playerMixer.clipAction(a);
                if(a.name === 'Punch') playerActions.attack = playerMixer.clipAction(a);
            });
            playerActions.idle?.play();

            if(currentWeapon === 'companion') {
                createCompanion(pGltf);
            }

            // คลิกซ้ายฟัน/ยิงปืน
            window.addEventListener('mousedown', (e) => {
                if(e.button === 0) performAttack();
            });

            isReady = true;
            startMultiplayerSync();
            setupInput();
            animate();
        }

        function createCompanion(gltf) {
            companion = SkeletonUtils.clone(gltf.scene);
            companion.scale.set(0.18, 0.18, 0.18);
            companion.traverse(n => { if(n.isMesh) n.material.emissive = new THREE.Color(0x00f2ff); });
            scene.add(companion);

            companionMixer = new THREE.AnimationMixer(companion);
            const runClip = gltf.animations.find(a => a.name === 'Running');
            if(runClip) {
                companionAction = companionMixer.clipAction(runClip);
                companionAction.play();
            }
        }

        function performAttack() {
            if(!player || stats.isAttacking) return;

            stats.isAttacking = true;
            playerActions.run?.stop();
            playerActions.idle?.stop();
            playerActions.attack?.reset().setLoop(THREE.LoopOnce).play();

            setTimeout(() => { stats.isAttacking = false; }, 400);

            if(currentWeapon === 'melee') {
                zombies.forEach((z) => {
                    if(z.model.position.distanceTo(player.position) < 3.5) {
                        applyDamageToZombie(z, 15);
                    }
                });
            } else if(currentWeapon === 'pistol') {
                let target = getNearestZombie(20);
                if(target) shootBullet(target.position);
            }
        }

        function shootBullet(targetPos) {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0xffea00}));
            b.position.copy(player.position).y = 1.2;
            const dir = new THREE.Vector3().subVectors(targetPos, player.position).normalize();
            scene.add(b);
            bullets.push({ mesh: b, dir, life: 60 });
        }

        function getNearestZombie(maxDist) {
            let target = null;
            let minDist = maxDist;
            zombies.forEach(z => {
                if(!z.isDead) {
                    const dist = z.model.position.distanceTo(player.position);
                    if(dist < minDist) { minDist = dist; target = z.model; }
                }
            });
            return target;
        }

        function spawnZombie() {
            if(!zombieBase || zombies.length > 10) return;
            const model = SkeletonUtils.clone(zombieBase);
            model.scale.set(1.4, 1.4, 1.4);
            
            const a = Math.random() * Math.PI * 2;
            model.position.set(player.position.x + Math.cos(a)*30, 0, player.position.z + Math.sin(a)*30);
            scene.add(model);
            
            const mixer = new THREE.AnimationMixer(model);
            const isRunner = Math.random() > 0.5; // สุ่มให้ซอมบี้ 50% วิ่งเร็ว
            
            const clipName = isRunner ? 'Run' : 'Walk';
            // ป้องกันการสะกดผิดเคสตัวพิมพ์เล็ก/ใหญ่ของไฟล์โมเดลภายนอกด้วยการใช้ fallback ตัวแรกหากไม่เจอ
            const actionClip = zombieAnims.find(an => an.name.toLowerCase() === clipName.toLowerCase()) || zombieAnims[0];
            const deadClip = zombieAnims.find(an => an.name.toLowerCase() === 'dead') || zombieAnims[1];

            const actions = {
                move: mixer.clipAction(actionClip),
                death: mixer.clipAction(deadClip)
            };
            
            actions.move.play();
            
            zombies.push({ 
                model, mixer, actions, 
                hp: 10, isDead: false, 
                speed: isRunner ? 5.0 : 2.5 // ปรับค่าความเร็วเดินและวิ่งให้ชัดเจนขึ้น
            });
        }

        function applyDamageToZombie(z, dmg) {
            z.hp -= dmg;
            if(z.hp <= 0 && !z.isDead) {
                z.isDead = true;
                z.actions.move.fadeOut(0.2);
                z.actions.death.reset().fadeIn(0.2).setLoop(THREE.LoopOnce).play();
                z.actions.death.clampWhenFinished = true;
                stats.money += 10;
                setTimeout(() => {
                    scene.remove(z.model);
                    const idx = zombies.indexOf(z);
                    if(idx > -1) zombies.splice(idx, 1);
                }, 1800);
            }
        }

        let controls;
        function animate() {
            requestAnimationFrame(animate);
            if(!isReady) return;
            
            // คำนวณความเร็วเฟรมเรตจริง (Delta Time)
            const delta = clock.getDelta();

            if(player) {
                // เคลื่อนที่ตามทิศทางกล้องหัน
                if(moveVec.length() > 0.1 && !stats.isAttacking) {
                    player.position.addScaledVector(moveVec, stats.speed * delta);
                    const targetAngle = Math.atan2(moveVec.x, moveVec.z);
                    player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, targetAngle, 0.15);

                    if(!playerActions.run?.isRunning()) {
                        playerActions.idle?.stop();
                        playerActions.run?.play();
                    }
                } else if(!stats.isAttacking) {
                    if(!playerActions.idle?.isRunning()) {
                        playerActions.run?.stop();
                        playerActions.idle?.play();
                    }
                }

                // กล้องเดินติดตามผู้เล่นแบบสมูท
                controls.target.lerp(player.position, 0.1);
                controls.update();

                // หุ่นผู้ช่วยบินตาม
                if(companion) {
                    const targetPos = player.position.clone().add(new THREE.Vector3(-1.5, 0, 1.5));
                    companion.position.lerp(targetPos, 0.08);
                    companion.lookAt(player.position);
                    if(companionMixer) companionMixer.update(delta);

                    if(Date.now() - lastShot > 800) {
                        let target = getNearestZombie(15);
                        if(target) {
                            shootBullet(target.position);
                            lastShot = Date.now();
                        }
                    }
                }

                update(ref(db, 'players/' + PLAYER_ID), { x: player.position.x, z: player.position.z, ry: player.rotation.y });
            }

            if(playerMixer) playerMixer.update(delta);

            // อัปเดตการเคลื่อนไหวของซอมบี้ (มีท่าทางและเคลื่อนไหวแน่นอน!)
            zombies.forEach((z) => {
                z.mixer.update(delta);
                if(!z.isDead) {
                    const dir = new THREE.Vector3().subVectors(player.position, z.model.position).normalize();
                    // บังคับการเคลื่อนไหวตามตำแหน่งและเวลากลางจริง
                    z.model.position.addScaledVector(dir, z.speed * delta);
                    z.model.lookAt(player.position);
                    
                    if(z.model.position.distanceTo(player.position) < 1.1) {
                        stats.hp -= 15 * delta;
                        if(stats.hp <= 0) document.getElementById('game-over').style.display='block';
                    }
                }
            });

            // อัปเดตกระสุนปืนพก
            for(let i=bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                b.mesh.position.addScaledVector(b.dir, 35 * delta);
                b.life--;

                zombies.forEach((z) => {
                    if(!z.isDead && b.mesh.position.distanceTo(z.model.position) < 1.5) {
                        applyDamageToZombie(z, 5);
                        b.life = 0;
                    }
                });

                if(b.life <= 0) { scene.remove(b.mesh); bullets.splice(i, 1); }
            }

            if(Math.random() < 0.012) spawnZombie();
            updateUI();
            renderer.render(scene, camera);
        }

        function startMultiplayerSync() {
            onValue(ref(db, 'players'), (snap) => {
                const data = snap.val();
                if(!data) return;
                document.getElementById('online-val').innerText = Object.keys(data).length;
                Object.keys(data).forEach(id => {
                    if(id === PLAYER_ID) return;
                    if(!otherPlayers[id]) {
                        const m = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), new THREE.MeshPhongMaterial({color:0xff007b}));
                        scene.add(m); otherPlayers[id] = m;
                    }
                    otherPlayers[id].position.lerp(new THREE.Vector3(data[id].x, 0, data[id].z), 0.2);
                });
            });
            onDisconnect(ref(db, 'players/' + PLAYER_ID)).remove();
        }

        function setupInput() {
            const keys = {};
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            
            setInterval(() => {
                let x = 0, z = 0;
                if(keys['KeyW']) z = -1; if(keys['KeyS']) z = 1;
                if(keys['KeyA']) x = -1; if(keys['KeyD']) x = 1;
                moveVec.set(x, 0, z).normalize();
            }, 10);

            nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'green' })
            .on('move', (e, d) => moveVec.set(Math.cos(d.angle.radian), 0, -Math.sin(d.angle.radian)))
            .on('end', () => moveVec.set(0,0,0));
        }

        function updateUI() {
            document.getElementById('hp-fill').style.width = Math.max(0, stats.hp) + "%";
            document.getElementById('coin-val').innerText = stats.money;
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
