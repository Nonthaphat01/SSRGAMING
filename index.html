<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meadow Survivor - Smooth 60FPS</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Orbitron', sans-serif; background: #87ceeb; user-select: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hud { position: absolute; padding: 15px; pointer-events: auto; background: rgba(255,255,255,0.85); border: 2px solid #2d5a27; border-radius: 12px; color: #2d5a27; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .top-left { top: 20px; left: 20px; }
        #hp-bar { width: 220px; height: 12px; background: #ddd; border: 1px solid #2d5a27; margin-top: 5px; border-radius: 10px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4b2b, #ff416c); transition: width 0.15s ease-out; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border: 4px solid #ff416c; text-align: center; display: none; pointer-events: auto; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        button { background: #2d5a27; border: none; color: white; padding: 12px 25px; font-family: 'Orbitron'; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #1c3d18; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div style="border: 5px solid #f3f3f3; border-top: 5px solid #2d5a27; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 15px; color: #2d5a27; font-weight: bold; letter-spacing: 2px;">OPTIMIZING GRAPHICS ENGINE...</p>
    </div>

    <div id="ui-layer">
        <div class="hud top-left">
            <div style="font-weight: bold; font-size: 11px; letter-spacing: 1px;">SURVIVOR STATUS</div>
            <div id="hp-bar"><div id="hp-fill"></div></div>
            <div style="margin-top:10px; font-size: 20px; font-weight: bold;">🪙 <span id="coin-val">0</span></div>
            <div style="font-size: 10px; margin-top:5px; opacity: 0.7;">CONNECTED SURVIVORS: <span id="online-val">1</span></div>
        </div>
        <div id="game-over" class="overlay">
            <h1 style="color:#ff416c; margin-top: 0;">LINK INTERRUPTED</h1>
            <p style="color:#666;">Your nanobot system has been compromised.</p>
            <button onclick="location.reload()">RE-ESTABLISH LINK</button>
        </div>
    </div>

    <div id="joystick-zone"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyC1SLWvio-oYibt4pzY8xVZRErHAbMLqbk",
            authDomain: "ssr-zombie.firebaseapp.com",
            projectId: "ssr-zombie",
            storageBucket: "ssr-zombie.firebasestorage.app",
            messagingSenderId: "675922375054",
            appId: "1:675922375054:web:660c59fdf774f1e94c74df",
            databaseURL: "https://ssr-zombie-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const PLAYER_ID = "P_" + Math.floor(Math.random() * 9999);
        const MODELS = {
            player: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
            zombie: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Soldier.glb'
        };

        let scene, camera, renderer, clock, player;
        let playerMixer, playerActions = {};
        let zombieBase, zombieAnims, isReady = false;
        let otherPlayers = {}, zombies = [], bullets = [];
        let moveVec = new THREE.Vector3();
        let stats = { hp: 100, money: 0, speed: 10 }; // ปรับ Base Speed สำหรับระบบ Delta Time
        let lastShot = 0;

        // Shared Geometry/Material เพื่อประหยัด CPU/GPU
        const bulletGeometry = new THREE.SphereGeometry(0.15, 8, 8);
        const bulletMaterial = new THREE.MeshBasicMaterial({ color: 0xffea00 });

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xb0e0e6); // สีท้องฟ้าสดใส (Powder Blue)

            camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // จำกัด Pixel Ratio เพื่อความลื่นไหลบนมือถือจอความละเอียดสูง
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(30, 80, 30);
            sun.castShadow = true;
            scene.add(sun);

            // Ground
            const grassGeo = new THREE.PlaneGeometry(1000, 1000);
            const grassMat = new THREE.MeshLambertMaterial({ color: 0x556b2f }); // สีเขียวทุ่งหญ้าธรรมชาติ (Dark Olive Green)
            const ground = new THREE.Mesh(grassGeo, grassMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const loader = new GLTFLoader();

            try {
                // Load Zombie
                const zGltf = await loader.loadAsync(MODELS.zombie);
                zombieBase = zGltf.scene;
                zombieAnims = zGltf.animations;

                // Load Player
                const pGltf = await loader.loadAsync(MODELS.player);
                player = pGltf.scene;
                player.scale.set(0.4, 0.4, 0.4);
                player.traverse(n => { if(n.isMesh) n.castShadow = true; });
                scene.add(player);

                playerMixer = new THREE.AnimationMixer(player);
                pGltf.animations.forEach(a => {
                    if(a.name === 'Idle') playerActions.idle = playerMixer.clipAction(a);
                    if(a.name === 'Running') playerActions.run = playerMixer.clipAction(a);
                });
                playerActions.idle?.play();

                document.getElementById('loading-screen').style.display = 'none';
                isReady = true;
                startMultiplayerSync();
                setupInput();
                animate();
            } catch (e) { console.error("Asset load failure:", e); }
        }

        function spawnZombie() {
            if(!zombieBase || zombies.length > 12) return;
            const model = SkeletonUtils.clone(zombieBase);
            model.scale.set(1.4, 1.4, 1.4);
            
            const a = Math.random() * Math.PI * 2;
            model.position.set(player.position.x + Math.cos(a)*35, 0, player.position.z + Math.sin(a)*35);
            scene.add(model);
            
            const mixer = new THREE.AnimationMixer(model);
            const walkClip = zombieAnims.find(an => an.name === 'Walk');
            const deadClip = zombieAnims.find(an => an.name === 'Dead');

            const actions = {
                walk: mixer.clipAction(walkClip),
                death: mixer.clipAction(deadClip)
            };
            
            actions.walk.play();
            
            zombies.push({ model, mixer, actions, hp: 10, isDead: false });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!isReady) return;
            const delta = clock.getDelta();

            if(player) {
                // เคลื่อนที่แบบสมูทโดยใช้ Delta Time
                if(moveVec.length() > 0.1) {
                    player.position.addScaledVector(moveVec, stats.speed * delta);
                    
                    // ปรับทิศทางการหันหน้าอย่างนุ่มนวล (Smooth Rotation Lerp)
                    const targetAngle = Math.atan2(moveVec.x, moveVec.z);
                    player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, targetAngle, 0.15);

                    if(!playerActions.run?.isRunning()) {
                        playerActions.idle?.fadeOut(0.2);
                        playerActions.run?.reset().fadeIn(0.2).play();
                    }
                } else {
                    if(!playerActions.idle?.isRunning()) {
                        playerActions.run?.fadeOut(0.2);
                        playerActions.idle?.reset().fadeIn(0.2).play();
                    }
                }

                // กล้องเคลื่อนตามผู้เล่นอย่างสมูท (Lerp Camera)
                const camTarget = new THREE.Vector3(player.position.x, player.position.y + 7, player.position.z + 10);
                camera.position.lerp(camTarget, 0.08); // ค่าความเร็วในการตามของกล้อง
                camera.lookAt(player.position);

                // ส่งตำแหน่งขึ้น Firebase
                update(ref(db, 'players/' + PLAYER_ID), { x: player.position.x, z: player.position.z, ry: player.rotation.y });

                // ค้นหาเป้าหมายและยิงอัตโนมัติ
                if(Date.now() - lastShot > 400) {
                    let target = null;
                    let minDist = 18;
                    zombies.forEach(z => { 
                        if(!z.isDead) {
                            const dist = z.model.position.distanceTo(player.position);
                            if (dist < minDist) { minDist = dist; target = z.model; }
                        }
                    });
                    if(target) { shoot(target.position); lastShot = Date.now(); }
                }
            }

            if(playerMixer) playerMixer.update(delta);

            // อัปเดตฝั่งซอมบี้
            zombies.forEach((z, i) => {
                z.mixer.update(delta);

                if(!z.isDead) {
                    // ซอมบี้เดินช้าแบบสมูทโดยใช้ Delta Time
                    const dir = new THREE.Vector3().subVectors(player.position, z.model.position).normalize();
                    z.model.position.addScaledVector(dir, 1.8 * delta); // 1.8 คือความเร็วเดิน
                    
                    // ปรับทิศทางซอมบี้ให้ค่อยๆ หันหาผู้เล่น
                    const targetAngle = Math.atan2(dir.x, dir.z);
                    z.model.rotation.y = THREE.MathUtils.lerp(z.model.rotation.y, targetAngle, 0.1);
                    
                    // เช็คการชนตัวผู้เล่น
                    if(z.model.position.distanceTo(player.position) < 1.1) {
                        stats.hp -= 15 * delta; // ลดเลือดตามเวลาจริง
                        if(stats.hp <= 0) document.getElementById('game-over').style.display='block';
                    }
                }

                // เช็คการถูกโจมตี
                bullets.forEach((b, bi) => {
                    if(!z.isDead && b.mesh.position.distanceTo(z.model.position) < 1.3) {
                        z.hp -= 5; 
                        b.life = 0; // ทำลายกระสุน
                        
                        if(z.hp <= 0) {
                            z.isDead = true;
                            // การเปลี่ยนท่าทางแบบไร้รอยต่อ (Seamless Animation Crossfade)
                            z.actions.walk.fadeOut(0.2);
                            z.actions.death.reset().fadeIn(0.2).setLoop(THREE.LoopOnce).play();
                            z.actions.death.clampWhenFinished = true;
                            stats.money += 10;
                            
                            // นำโมเดลออกจากฉากเมื่อล้มตายสนิท
                            setTimeout(() => {
                                scene.remove(z.model);
                                zombies.splice(i, 1);
                            }, 1800);
                        }
                    }
                });
            });

            // ควบคุมการเกิดซอมบี้
            if(Math.random() < 0.015) spawnZombie();
            updateBullets(delta);
            updateUI();
            renderer.render(scene, camera);
        }

        function shoot(targetPos) {
            const b = new THREE.Mesh(bulletGeometry, bulletMaterial);
            b.position.copy(player.position).y = 1.0;
            const dir = new THREE.Vector3().subVectors(targetPos, player.position).normalize();
            scene.add(b);
            bullets.push({ mesh: b, dir, life: 60 });
        }

        function updateBullets(delta) {
            for(let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.mesh.position.addScaledVector(b.dir, 35 * delta); // ความเร็วกระสุนคำนวณตามเวลาจริง
                b.life--;
                if(b.life <= 0) {
                    scene.remove(b.mesh);
                    // ไม่ล้าง Geometries และ Materials ตรงนี้เพื่อเก็บไว้ให้กระสุนลูกถัดไปใช้งาน (Optimized Memory)
                    bullets.splice(i, 1);
                }
            }
        }

        function startMultiplayerSync() {
            onValue(ref(db, 'players'), (snap) => {
                const data = snap.val();
                if(!data) return;
                document.getElementById('online-val').innerText = Object.keys(data).length;
                Object.keys(data).forEach(id => {
                    if(id === PLAYER_ID) return;
                    if(!otherPlayers[id]) {
                        const m = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), new THREE.MeshPhongMaterial({color:0xff007b}));
                        scene.add(m); otherPlayers[id] = m;
                    }
                    otherPlayers[id].position.lerp(new THREE.Vector3(data[id].x, 0, data[id].z), 0.2);
                });
            });
            onDisconnect(ref(db, 'players/' + PLAYER_ID)).remove();
        }

        function setupInput() {
            const keys = {};
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            
            // คำนวณเวกเตอร์ความแรงจากการเดิน
            setInterval(() => {
                let x = 0, z = 0;
                if(keys['KeyW']) z = -1; if(keys['KeyS']) z = 1;
                if(keys['KeyA']) x = -1; if(keys['KeyD']) x = 1;
                moveVec.set(x, 0, z).normalize();
            }, 10);

            // Joystick แบบสมูท
            nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'green' })
            .on('move', (e, d) => moveVec.set(Math.cos(d.angle.radian), 0, -Math.sin(d.angle.radian)))
            .on('end', () => moveVec.set(0,0,0));
        }

        function updateUI() {
            document.getElementById('hp-fill').style.width = Math.max(0, stats.hp) + "%";
            document.getElementById('coin-val').innerText = stats.money;
        }

        clock = new THREE.Clock();
        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
