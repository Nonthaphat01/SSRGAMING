<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Survivor: Fixed Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff007b; }
        body { margin: 0; overflow: hidden; font-family: 'Orbitron', sans-serif; background: #000; color: #fff; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hud { position: absolute; padding: 15px; pointer-events: auto; background: rgba(0,0,0,0.85); border: 1px solid var(--neon-blue); border-radius: 10px; }
        .top-left { top: 20px; left: 20px; }
        #hp-bar { width: 200px; height: 10px; background: #111; border: 1px solid var(--neon-blue); margin-top: 5px; border-radius: 5px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: var(--neon-blue); transition: 0.3s; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 40px; border: 2px solid var(--neon-pink); text-align: center; display: none; pointer-events: auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div style="border: 4px solid #222; border-top: 4px solid var(--neon-blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
        <p id="load-status" style="margin-top: 15px; font-size: 12px; letter-spacing: 2px;">SYNCING WORLD DATA...</p>
    </div>

    <div id="ui-layer">
        <div class="hud top-left">
            <div style="font-size: 9px; color: var(--neon-blue);">NANOBOT INTEGRITY</div>
            <div id="hp-bar"><div id="hp-fill"></div></div>
            <div style="margin-top:10px; font-size: 18px;">🪙 <span id="coin-val">0</span></div>
            <div style="font-size: 10px; margin-top:5px; opacity: 0.6;">SYSTEMS ACTIVE: <span id="online-val">1</span></div>
        </div>
        <div id="game-over" class="overlay">
            <h1 style="color:var(--neon-pink)">SYSTEMS OFFLINE</h1>
            <button onclick="location.reload()" style="background:transparent; border:1px solid var(--neon-blue); color:white; padding:10px 20px; font-family:'Orbitron'; cursor:pointer;">RE-SYNC</button>
        </div>
    </div>

    <div id="joystick-zone"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js'; // แก้ไขการ Import ที่นี่
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyC1SLWvio-oYibt4pzY8xVZRErHAbMLqbk",
            authDomain: "ssr-zombie.firebaseapp.com",
            projectId: "ssr-zombie",
            storageBucket: "ssr-zombie.firebasestorage.app",
            messagingSenderId: "675922375054",
            appId: "1:675922375054:web:660c59fdf774f1e94c74df",
            databaseURL: "https://ssr-zombie-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CONFIG ---
        const PLAYER_ID = "P_" + Math.floor(Math.random() * 9999);
        const MODELS = {
            player: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
            zombie: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Soldier.glb'
        };

        let scene, camera, renderer, clock, controls, player;
        let playerMixer, playerActions = {};
        let zombieBase, zombieAnims, isReady = false;
        let otherPlayers = {}, zombies = [], bullets = [];
        let moveVec = new THREE.Vector3();
        let stats = { hp: 100, money: 0, speed: 0.18 };
        let lastShot = 0;

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.04);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 12, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.maxPolarAngle = Math.PI / 2.1;

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0x00f2ff, 1.2);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            scene.add(sun);

            // Ground & Props
            scene.add(new THREE.GridHelper(200, 60, 0x00f2ff, 0x111111));
            spawnWorldDecoration();

            const loader = new GLTFLoader();

            try {
                // Load Zombie Template
                const zGltf = await loader.loadAsync(MODELS.zombie);
                zombieBase = zGltf.scene;
                zombieAnims = zGltf.animations;

                // Load Player
                const pGltf = await loader.loadAsync(MODELS.player);
                player = pGltf.scene;
                player.scale.set(0.4, 0.4, 0.4);
                player.traverse(n => { if(n.isMesh) n.castShadow = true; });
                scene.add(player);

                playerMixer = new THREE.AnimationMixer(player);
                pGltf.animations.forEach(a => {
                    if(a.name === 'Idle') playerActions.idle = playerMixer.clipAction(a);
                    if(a.name === 'Running') playerActions.run = playerMixer.clipAction(a);
                });
                playerActions.idle?.play();

                document.getElementById('loading-screen').style.display = 'none';
                isReady = true;
                startMultiplayerSync();
                setupInput();
                animate();
            } catch (err) {
                console.error("Failed to load assets:", err);
                document.getElementById('load-status').innerText = "ERROR: LINK FAILURE";
            }
        }

        function spawnWorldDecoration() {
            for(let i=0; i<30; i++) {
                const group = new THREE.Group();
                const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 6), new THREE.MeshPhongMaterial({color:0x222222}));
                pole.position.y = 3;
                group.add(pole);
                
                const light = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color:0x00f2ff}));
                light.position.y = 6;
                group.add(light);

                const pLight = new THREE.PointLight(0x00f2ff, 5, 12);
                pLight.position.y = 6;
                group.add(pLight);

                const a = Math.random() * Math.PI * 2;
                const d = 25 + Math.random() * 80;
                group.position.set(Math.cos(a)*d, 0, Math.sin(a)*d);
                scene.add(group);
            }
        }

        function spawnZombie() {
            if(!zombieBase || zombies.length > 8) return;
            // ใช้ SkeletonUtils.clone ตามวิธีนำเข้าใหม่
            const model = SkeletonUtils.clone(zombieBase);
            model.scale.set(1.5, 1.5, 1.5);
            
            const a = Math.random() * Math.PI * 2;
            model.position.set(player.position.x + Math.cos(a)*35, 0, player.position.z + Math.sin(a)*35);
            scene.add(model);
            
            const mixer = new THREE.AnimationMixer(model);
            const walk = zombieAnims.find(an => an.name === 'Walk');
            if(walk) mixer.clipAction(walk).play();
            
            zombies.push({ model, mixer, hp: 10 });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!isReady) return;
            const delta = clock.getDelta();

            // Player movement
            if(player) {
                if(moveVec.length() > 0.1) {
                    const angle = Math.atan2(moveVec.x, moveVec.z) + camera.rotation.y;
                    player.position.addScaledVector(new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle)), stats.speed);
                    player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, angle, 0.15);
                    if(!playerActions.run?.isRunning()) { playerActions.idle?.stop(); playerActions.run?.play(); }
                } else {
                    if(!playerActions.idle?.isRunning()) { playerActions.run?.stop(); playerActions.idle?.play(); }
                }
                controls.target.lerp(player.position, 0.1);
                controls.update();

                update(ref(db, 'players/' + PLAYER_ID), { x: player.position.x, z: player.position.z, ry: player.rotation.y });

                if(Date.now() - lastShot > 400) {
                    let target = null;
                    zombies.forEach(z => { if(z.model.position.distanceTo(player.position) < 18) target = z.model; });
                    if(target) { shoot(target.position); lastShot = Date.now(); }
                }
            }

            if(playerMixer) playerMixer.update(delta);

            zombies.forEach((z, i) => {
                const dir = new THREE.Vector3().subVectors(player.position, z.model.position).normalize();
                z.model.position.addScaledVector(dir, 0.06);
                z.model.lookAt(player.position);
                z.mixer.update(delta);
                
                if(z.model.position.distanceTo(player.position) < 1.2) {
                    stats.hp -= 0.3;
                    if(stats.hp <= 0) document.getElementById('game-over').style.display='block';
                }

                bullets.forEach((b, bi) => {
                    if(b.mesh.position.distanceTo(z.model.position) < 1.5) {
                        z.hp -= 5; b.life = 0;
                        if(z.hp <= 0) { scene.remove(z.model); zombies.splice(i,1); stats.money += 10; }
                    }
                });
            });

            if(Math.random() < 0.02) spawnZombie();
            updateBullets();
            updateUI();
            renderer.render(scene, camera);
        }

        function shoot(targetPos) {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(player.position).y = 1.2;
            const dir = new THREE.Vector3().subVectors(targetPos, player.position).normalize();
            scene.add(b);
            bullets.push({ mesh: b, dir, life: 100 });
        }

        function startMultiplayerSync() {
            onValue(ref(db, 'players'), (snap) => {
                const data = snap.val();
                if(!data) return;
                document.getElementById('online-val').innerText = Object.keys(data).length;
                Object.keys(data).forEach(id => {
                    if(id === PLAYER_ID) return;
                    if(!otherPlayers[id]) {
                        const m = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), new THREE.MeshPhongMaterial({color:0xff007b}));
                        scene.add(m); otherPlayers[id] = m;
                    }
                    otherPlayers[id].position.lerp(new THREE.Vector3(data[id].x, 0, data[id].z), 0.2);
                });
            });
            onDisconnect(ref(db, 'players/' + PLAYER_ID)).remove();
        }

        function setupInput() {
            const keys = {};
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            setInterval(() => {
                let x = 0, z = 0;
                if(keys['KeyW']) z = 1; if(keys['KeyS']) z = -1;
                if(keys['KeyA']) x = 1; if(keys['KeyD']) x = -1;
                moveVec.set(x, 0, z).normalize();
            }, 10);
            nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'cyan' })
            .on('move', (e, d) => moveVec.set(Math.sin(d.angle.radian), 0, Math.cos(d.angle.radian)))
            .on('end', () => moveVec.set(0,0,0));
        }

        function updateBullets() {
            for(let i=bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                b.mesh.position.addScaledVector(b.dir, 0.6); b.life--;
                if(b.life <= 0) { scene.remove(b.mesh); bullets.splice(i,1); }
            }
        }

        function updateUI() {
            document.getElementById('hp-fill').style.width = stats.hp + "%";
            document.getElementById('coin-val').innerText = stats.money;
        }

        clock = new THREE.Clock();
        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
