<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Survivor: Open World</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff007b; }
        body { margin: 0; overflow: hidden; font-family: 'Orbitron', sans-serif; background: #000; color: #fff; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hud { position: absolute; padding: 20px; pointer-events: auto; background: rgba(0,0,0,0.85); border: 1px solid var(--neon-blue); border-radius: 15px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .top-left { top: 20px; left: 20px; }
        #hp-bar { width: 220px; height: 12px; background: #111; border: 1px solid var(--neon-blue); margin-top: 5px; border-radius: 6px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #0066ff, var(--neon-blue)); transition: 0.3s; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 40px; border: 2px solid var(--neon-pink); text-align: center; display: none; pointer-events: auto; }
        .instruction { position: absolute; bottom: 20px; right: 20px; font-size: 10px; color: var(--neon-blue); opacity: 0.7; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div style="border: 5px solid #222; border-top: 5px solid var(--neon-blue); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
        <p id="load-text" style="margin-top: 15px; letter-spacing: 3px;">DOWNLOADING ASSETS...</p>
    </div>

    <div id="ui-layer">
        <div class="hud top-left">
            <div style="font-size: 10px; color: var(--neon-blue); letter-spacing: 2px;">NEURAL INTERFACE</div>
            <div id="hp-bar"><div id="hp-fill"></div></div>
            <div style="margin-top:10px; font-size: 20px; color: gold;">🪙 <span id="coin-val">0</span></div>
            <div style="font-size: 10px; margin-top:5px; color: #aaa;">SURVIVORS ONLINE: <span id="online-val" style="color:var(--neon-pink)">1</span></div>
        </div>
        <div id="game-over" class="overlay">
            <h1 style="color:var(--neon-pink)">SYSTEM FAILURE</h1>
            <button onclick="location.reload()" style="background:transparent; border:2px solid var(--neon-blue); color:white; padding:10px 20px; font-family:'Orbitron'; cursor:pointer;">RE-STABILIZE</button>
        </div>
        <div class="instruction">WASD: MOVE | MOUSE: ROTATE VIEW | SCROLL: ZOOM</div>
    </div>

    <div id="joystick-zone"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { SkeletonUtils } from 'three/addons/utils/SkeletonUtils.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyC1SLWvio-oYibt4pzY8xVZRErHAbMLqbk",
            authDomain: "ssr-zombie.firebaseapp.com",
            projectId: "ssr-zombie",
            storageBucket: "ssr-zombie.firebasestorage.app",
            messagingSenderId: "675922375054",
            appId: "1:675922375054:web:660c59fdf774f1e94c74df",
            databaseURL: "https://ssr-zombie-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- ASSET CONFIG ---
        const MODEL_URLS = {
            player: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
            zombie: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Soldier.glb',
            crate: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/BoomBox.glb' // ใช้ Boombox เป็นตัวแทนสิ่งของเรืองแสง
        };

        let scene, camera, renderer, clock, controls, player;
        let playerMixer, playerActions = {};
        let zombieBase, zombieAnims;
        let otherPlayers = {}, zombies = [], bullets = [], props = [];
        let moveVec = new THREE.Vector3();
        let stats = { hp: 100, money: 0, speed: 0.18, fireRate: 400 };
        const PLAYER_ID = "P_" + Math.floor(Math.random() * 9999);

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020208);
            scene.fog = new THREE.FogExp2(0x020208, 0.035);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.maxPolarAngle = Math.PI / 2.2;

            // Lights
            scene.add(new THREE.AmbientLight(0x404040, 0.8));
            const mainLight = new THREE.DirectionalLight(0x00f2ff, 1.2);
            mainLight.position.set(20, 40, 20);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.set(1024, 1024);
            scene.add(mainLight);

            // Ground Decoration
            const grid = new THREE.GridHelper(300, 100, 0x00f2ff, 0x111111);
            scene.add(grid);

            const loader = new GLTFLoader();

            // Load Global Assets
            document.getElementById('load-text').innerText = "LOADING ZOMBIE VIRUS...";
            const zData = await loader.loadAsync(MODEL_URLS.zombie);
            zombieBase = zData.scene;
            zombieAnims = zData.animations;

            document.getElementById('load-text').innerText = "CALIBRATING SURVIVOR...";
            loader.load(MODEL_URLS.player, (gltf) => {
                player = gltf.scene;
                player.scale.set(0.5, 0.5, 0.5);
                player.traverse(n => { if(n.isMesh) n.castShadow = true; });
                scene.add(player);

                playerMixer = new THREE.AnimationMixer(player);
                gltf.animations.forEach(a => {
                    if(a.name === 'Idle') playerActions.idle = playerMixer.clipAction(a);
                    if(a.name === 'Running') playerActions.run = playerMixer.clipAction(a);
                });
                playerActions.idle?.play();

                spawnWorldProps(); // สร้างสิ่งของรอบแผนที่
                startSync();
                setupInputs();
                
                document.getElementById('loading-screen').style.display = 'none';
                animate();
            });
        }

        // --- WORLD GENERATION ---
        function spawnWorldProps() {
            // สร้างสิ่งของกระจาย (Props)
            for(let i=0; i<40; i++) {
                const type = Math.random();
                let prop;

                if(type > 0.7) {
                    // สร้างเสาไฟนีออน (Cyber Streetlight)
                    prop = createStreetlight();
                } else {
                    // สร้างกล่อง/ลังไม้ (Props)
                    const geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
                    const mat = new THREE.MeshPhongMaterial({color: 0x333333});
                    prop = new THREE.Mesh(geo, mat);
                    prop.castShadow = true;
                    prop.receiveShadow = true;
                }

                const dist = 30 + Math.random() * 100;
                const angle = Math.random() * Math.PI * 2;
                prop.position.set(Math.cos(angle)*dist, 0, Math.sin(angle)*dist);
                if(type <= 0.7) prop.position.y = 0.75; // กล่องวางบนพื้น

                scene.add(prop);
                props.push(prop);
            }
        }

        function createStreetlight() {
            const group = new THREE.Group();
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 8), new THREE.MeshPhongMaterial({color:0x222222}));
            pole.position.y = 4;
            group.add(pole);

            const lightBulb = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color:0x00f2ff}));
            lightBulb.position.y = 8;
            group.add(lightBulb);

            const pLight = new THREE.PointLight(0x00f2ff, 10, 15);
            pLight.position.y = 8;
            group.add(pLight);

            return group;
        }

        function spawnZombie() {
            if(!zombieBase || zombies.length > 10) return;
            const model = SkeletonUtils.clone(zombieBase);
            model.scale.set(1.5, 1.5, 1.5);
            
            const angle = Math.random() * Math.PI * 2;
            model.position.set(player.position.x + Math.cos(angle)*40, 0, player.position.z + Math.sin(angle)*40);
            scene.add(model);
            
            const mixer = new THREE.AnimationMixer(model);
            const walk = zombieAnims.find(a => a.name === 'Walk');
            if(walk) mixer.clipAction(walk).play();

            zombies.push({ model, mixer, hp: 15 });
        }

        // --- CORE GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if(player) {
                // เคลื่อนที่ตามทิศทางกล้อง
                if(moveVec.length() > 0.1) {
                    const angle = Math.atan2(moveVec.x, moveVec.z) + camera.rotation.y;
                    const finalDir = new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle));
                    player.position.addScaledVector(finalDir, stats.speed);
                    player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, angle, 0.15);

                    if(!playerActions.run?.isRunning()) { playerActions.idle?.stop(); playerActions.run?.play(); }
                } else {
                    if(!playerActions.idle?.isRunning()) { playerActions.run?.stop(); playerActions.idle?.play(); }
                }

                controls.target.lerp(player.position, 0.1);
                controls.update();

                // Firebase Sync
                update(ref(db, 'players/' + PLAYER_ID), {
                    x: player.position.x, z: player.position.z, ry: player.rotation.y
                });

                // Auto Shot
                if(Date.now() - lastShot > stats.fireRate) {
                    let target = null;
                    zombies.forEach(z => { if(z.model.position.distanceTo(player.position) < 20) target = z.model; });
                    if(target) { shoot(target.position); lastShot = Date.now(); }
                }
            }

            // Update Elements
            if(playerMixer) playerMixer.update(delta);
            zombies.forEach((z, i) => {
                const dir = new THREE.Vector3().subVectors(player.position, z.model.position).normalize();
                z.model.position.addScaledVector(dir, 0.06);
                z.model.lookAt(player.position);
                z.mixer.update(delta);

                if(z.model.position.distanceTo(player.position) < 1.3) {
                    stats.hp -= 0.4;
                    if(stats.hp <= 0) document.getElementById('game-over').style.display='block';
                }

                bullets.forEach((b, bi) => {
                    if(b.mesh.position.distanceTo(z.model.position) < 1.5) {
                        z.hp -= 5; b.life = 0;
                        if(z.hp <= 0) { 
                            scene.remove(z.model); zombies.splice(i,1); stats.money += 10; 
                        }
                    }
                });
            });

            if(Math.random() < 0.02) spawnZombie();
            updateBullets();
            updateUI();
            renderer.render(scene, camera);
        }

        // --- UTILS ---
        function shoot(targetPos) {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(player.position).y = 1.2;
            const dir = new THREE.Vector3().subVectors(targetPos, player.position).normalize();
            scene.add(b);
            bullets.push({ mesh: b, dir, life: 80 });
        }

        function startSync() {
            onValue(ref(db, 'players'), (snap) => {
                const data = snap.val();
                if(!data) return;
                document.getElementById('online-val').innerText = Object.keys(data).length;
                Object.keys(data).forEach(id => {
                    if(id === PLAYER_ID) return;
                    if(!otherPlayers[id]) {
                        const m = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), new THREE.MeshPhongMaterial({color:0xff007b}));
                        scene.add(m); otherPlayers[id] = m;
                    }
                    otherPlayers[id].position.lerp(new THREE.Vector3(data[id].x, 0, data[id].z), 0.2);
                });
            });
        }

        function setupInputs() {
            const keys = {};
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            setInterval(() => {
                let x = 0, z = 0;
                if(keys['KeyW']) z = 1; if(keys['KeyS']) z = -1;
                if(keys['KeyA']) x = 1; if(keys['KeyD']) x = -1;
                moveVec.set(x, 0, z).normalize();
            }, 10);
            nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'cyan' })
            .on('move', (e, d) => moveVec.set(Math.sin(d.angle.radian), 0, Math.cos(d.angle.radian)))
            .on('end', () => moveVec.set(0,0,0));
        }

        function updateBullets() {
            for(let i=bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                b.mesh.position.addScaledVector(b.dir, 0.7); b.life--;
                if(b.life <= 0) { scene.remove(b.mesh); bullets.splice(i,1); }
            }
        }

        function updateUI() {
            document.getElementById('hp-fill').style.width = stats.hp + "%";
            document.getElementById('coin-val').innerText = stats.money;
        }

        clock = new THREE.Clock();
        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
