<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSR Zombie - Final Fixed</title>
    
    <!-- นำเข้า NippleJS สำหรับ Joystick (ตัวเดียวที่ใช้ Script tag ได้) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff007b; }
        body { margin: 0; overflow: hidden; font-family: 'Orbitron', sans-serif; background: #000; color: #fff; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hud { position: absolute; padding: 20px; pointer-events: auto; background: rgba(0,0,0,0.7); border: 1px solid var(--neon-blue); }
        .top-left { top: 10px; left: 10px; border-radius: 0 15px 15px 0; }
        #hp-bar { width: 200px; height: 10px; background: #222; border: 1px solid var(--neon-blue); margin-top: 5px; }
        #hp-fill { width: 100%; height: 100%; background: var(--neon-blue); transition: 0.3s; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 40px; border: 2px solid var(--neon-pink); text-align: center; display: none; pointer-events: auto; }
        button { background: transparent; border: 1px solid var(--neon-blue); color: white; padding: 10px 20px; font-family: 'Orbitron'; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div style="border: 5px solid #222; border-top: 5px solid var(--neon-blue); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
        <p>LOADING SYSTEM...</p>
    </div>

    <div id="ui-layer">
        <div class="hud top-left">
            <div style="font-size: 10px;">INTEGRITY</div>
            <div id="hp-bar"><div id="hp-fill"></div></div>
            <div style="margin-top:10px">CREDITS: <span id="coin-val" style="color:var(--neon-blue)">0</span></div>
            <div style="font-size: 10px; margin-top:5px">PLAYERS: <span id="online-val">1</span></div>
        </div>
        <div id="game-over" class="overlay">
            <h1 style="color:var(--neon-pink)">CRITICAL ERROR</h1>
            <button onclick="location.reload()">REBOOT</button>
        </div>
    </div>

    <div id="joystick-zone"></div>

    <!-- ตั้งค่า Import Map ให้ถูกต้อง (ห้ามแก้ส่วนนี้) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Config ของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyC1SLWvio-oYibt4pzY8xVZRErHAbMLqbk",
            authDomain: "ssr-zombie.firebaseapp.com",
            projectId: "ssr-zombie",
            storageBucket: "ssr-zombie.firebasestorage.app",
            messagingSenderId: "675922375054",
            appId: "1:675922375054:web:660c59fdf774f1e94c74df",
            databaseURL: "https://ssr-zombie-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Game Constants
        const PLAYER_ID = "P_" + Math.floor(Math.random() * 9999);
        const MODEL_URLS = {
            player: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
            zombie: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Soldier.glb'
        };

        let scene, camera, renderer, clock, player;
        let playerMixer, playerActions = {};
        let otherPlayers = {}, zombies = [], bullets = [], items = [];
        let moveVec = new THREE.Vector3();
        let stats = { hp: 100, money: 0, speed: 0.15 };
        let lastShot = 0;

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0x00f2ff, 1);
            sun.position.set(5, 10, 5);
            sun.castShadow = true;
            scene.add(sun);

            scene.add(new THREE.GridHelper(100, 50, 0x00f2ff, 0x111111));

            const loader = new GLTFLoader();

            // Load Player
            loader.load(MODEL_URLS.player, (gltf) => {
                player = gltf.scene;
                player.scale.set(0.4, 0.4, 0.4);
                scene.add(player);

                playerMixer = new THREE.AnimationMixer(player);
                // RobotExpressive มีท่า: Idle, Running, Death
                gltf.animations.forEach(a => {
                    if(a.name === 'Idle') playerActions.idle = playerMixer.clipAction(a);
                    if(a.name === 'Running') playerActions.run = playerMixer.clipAction(a);
                });
                playerActions.idle?.play();

                document.getElementById('loading-screen').style.display = 'none';
                startSync();
                setupControls();
                animate();
            });
        }

        function startSync() {
            const pRef = ref(db, 'players/' + PLAYER_ID);
            onDisconnect(pRef).remove();

            onValue(ref(db, 'players'), (snap) => {
                const data = snap.val();
                if(!data) return;
                document.getElementById('online-val').innerText = Object.keys(data).length;

                Object.keys(data).forEach(id => {
                    if(id === PLAYER_ID) return;
                    if(!otherPlayers[id]) createOtherPlayer(id);
                    const op = otherPlayers[id];
                    if(op.mesh) {
                        op.mesh.position.lerp(new THREE.Vector3(data[id].x, 0, data[id].z), 0.2);
                        op.mesh.rotation.y = data[id].ry;
                    }
                });

                Object.keys(otherPlayers).forEach(id => {
                    if(!data[id]) { scene.remove(otherPlayers[id].mesh); delete otherPlayers[id]; }
                });
            });
        }

        function createOtherPlayer(id) {
            const geo = new THREE.BoxGeometry(1, 2, 1);
            const mat = new THREE.MeshPhongMaterial({color: 0xff007b});
            const mesh = new THREE.Mesh(geo, mat);
            scene.add(mesh);
            otherPlayers[id] = { mesh };
        }

        function setupControls() {
            const keys = {};
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);

            setInterval(() => {
                let x = 0, z = 0;
                if(keys['KeyW']) z = -1; if(keys['KeyS']) z = 1;
                if(keys['KeyA']) x = -1; if(keys['KeyD']) x = 1;
                moveVec.set(x, 0, z).normalize();
            }, 10);

            nipplejs.create({
                zone: document.getElementById('joystick-zone'),
                mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'cyan'
            }).on('move', (e, d) => {
                moveVec.set(Math.cos(d.angle.radian), 0, -Math.sin(d.angle.radian));
            }).on('end', () => moveVec.set(0,0,0));
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if(player) {
                const isMoving = moveVec.length() > 0.1;
                if(isMoving) {
                    player.position.addScaledVector(moveVec, stats.speed);
                    player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, Math.atan2(moveVec.x, moveVec.z), 0.1);
                    if(!playerActions.run?.isRunning()) { playerActions.idle?.stop(); playerActions.run?.play(); }
                } else {
                    if(!playerActions.idle?.isRunning()) { playerActions.run?.stop(); playerActions.idle?.play(); }
                }

                camera.position.lerp(new THREE.Vector3(player.position.x, 12, player.position.z + 10), 0.1);
                camera.lookAt(player.position);

                update(ref(db, 'players/' + PLAYER_ID), {
                    x: player.position.x, z: player.position.z, ry: player.rotation.y
                });

                // Shooting
                if(Date.now() - lastShot > 500) {
                    let target = null;
                    zombies.forEach(z => {
                        if(z.mesh.position.distanceTo(player.position) < 15) target = z.mesh;
                    });
                    if(target) {
                        shoot(target.position);
                        lastShot = Date.now();
                    }
                }
            }

            if(playerMixer) playerMixer.update(delta);
            updateZombies();
            updateBullets();
            updateUI();
            renderer.render(scene, camera);
        }

        function shoot(targetPos) {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(player.position).y = 1;
            const dir = new THREE.Vector3().subVectors(targetPos, player.position).normalize();
            scene.add(b);
            bullets.push({ mesh: b, dir, life: 100 });
        }

        function updateZombies() {
            if(zombies.length < 5) {
                const geo = new THREE.BoxGeometry(1, 2, 1);
                const mat = new THREE.MeshPhongMaterial({color: 0xff4400});
                const mesh = new THREE.Mesh(geo, mat);
                const a = Math.random() * Math.PI * 2;
                mesh.position.set(player.position.x + Math.cos(a)*20, 0, player.position.z + Math.sin(a)*20);
                scene.add(mesh);
                zombies.push({ mesh, hp: 10 });
            }

            zombies.forEach((z, i) => {
                const dir = new THREE.Vector3().subVectors(player.position, z.mesh.position).normalize();
                z.mesh.position.addScaledVector(dir, 0.04);
                if(z.mesh.position.distanceTo(player.position) < 1.2) {
                    stats.hp -= 0.2;
                    if(stats.hp <= 0) document.getElementById('game-over').style.display='block';
                }
                bullets.forEach((b, bi) => {
                    if(b.mesh.position.distanceTo(z.mesh.position) < 1.2) {
                        z.hp -= 5; b.life = 0;
                        if(z.hp <= 0) { scene.remove(z.mesh); zombies.splice(i,1); stats.money += 10; }
                    }
                });
            });
        }

        function updateBullets() {
            for(let i=bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                b.mesh.position.addScaledVector(b.dir, 0.5);
                b.life--;
                if(b.life <= 0) { scene.remove(b.mesh); bullets.splice(i,1); }
            }
        }

        function updateUI() {
            document.getElementById('hp-fill').style.width = stats.hp + "%";
            document.getElementById('coin-val').innerText = stats.money;
        }

        clock = new THREE.Clock();
        init();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
