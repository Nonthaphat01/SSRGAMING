<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survivor: Green Meadow 3D</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Orbitron', sans-serif; background: #87ceeb; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hud { position: absolute; padding: 15px; pointer-events: auto; background: rgba(255,255,255,0.8); border: 2px solid #2d5a27; border-radius: 10px; color: #2d5a27; }
        .top-left { top: 20px; left: 20px; }
        #hp-bar { width: 200px; height: 15px; background: #ddd; border: 1px solid #2d5a27; margin-top: 5px; border-radius: 10px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4b2b, #ff416c); transition: 0.3s; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; opacity: 0.8; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border: 4px solid #ff416c; text-align: center; display: none; pointer-events: auto; border-radius: 20px; }
        button { background: #2d5a27; border: none; color: white; padding: 10px 20px; font-family: 'Orbitron'; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div style="border: 5px solid #f3f3f3; border-top: 5px solid #2d5a27; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 15px; color: #2d5a27;">GENERATING WORLD...</p>
    </div>

    <div id="ui-layer">
        <div class="hud top-left">
            <div style="font-weight: bold;">LIFE SIGNAL</div>
            <div id="hp-bar"><div id="hp-fill"></div></div>
            <div style="margin-top:10px; font-size: 20px;">💰 <span id="coin-val">0</span></div>
            <div style="font-size: 10px; margin-top:5px">SURVIVORS: <span id="online-val">1</span></div>
        </div>
        <div id="game-over" class="overlay">
            <h1 style="color:#ff416c">YOU WERE DEFEATED</h1>
            <button onclick="location.reload()">TRY AGAIN</button>
        </div>
    </div>

    <div id="joystick-zone"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC1SLWvio-oYibt4pzY8xVZRErHAbMLqbk",
            authDomain: "ssr-zombie.firebaseapp.com",
            projectId: "ssr-zombie",
            storageBucket: "ssr-zombie.firebasestorage.app",
            messagingSenderId: "675922375054",
            appId: "1:675922375054:web:660c59fdf774f1e94c74df",
            databaseURL: "https://ssr-zombie-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const PLAYER_ID = "P_" + Math.floor(Math.random() * 9999);
        const MODELS = {
            player: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
            zombie: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Soldier.glb'
        };

        let scene, camera, renderer, clock, player;
        let playerMixer, playerActions = {};
        let zombieBase, zombieAnims, isReady = false;
        let otherPlayers = {}, zombies = [], bullets = [];
        let moveVec = new THREE.Vector3();
        let stats = { hp: 100, money: 0, speed: 0.2 };
        let lastShot = 0;

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // ท้องฟ้าสีคราม

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // แสงสว่าง (Bright Lighting)
            scene.add(new THREE.AmbientLight(0xffffff, 1.0)); // แสงรอบข้างสว่างๆ
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(50, 100, 50);
            sun.castShadow = true;
            scene.add(sun);

            // พื้นหญ้าเขียว (Green Grass)
            const grassGeo = new THREE.PlaneGeometry(1000, 1000);
            const grassMat = new THREE.MeshLambertMaterial({ color: 0x348C31 });
            const ground = new THREE.Mesh(grassGeo, grassMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            const loader = new GLTFLoader();

            try {
                // Load Zombie
                const zGltf = await loader.loadAsync(MODELS.zombie);
                zombieBase = zGltf.scene;
                zombieAnims = zGltf.animations;

                // Load Player
                const pGltf = await loader.loadAsync(MODELS.player);
                player = pGltf.scene;
                player.scale.set(0.4, 0.4, 0.4);
                player.traverse(n => { if(n.isMesh) n.castShadow = true; });
                scene.add(player);

                playerMixer = new THREE.AnimationMixer(player);
                pGltf.animations.forEach(a => {
                    if(a.name === 'Idle') playerActions.idle = playerMixer.clipAction(a);
                    if(a.name === 'Running') playerActions.run = playerMixer.clipAction(a);
                });
                playerActions.idle?.play();

                document.getElementById('loading-screen').style.display = 'none';
                isReady = true;
                startMultiplayerSync();
                setupInput();
                animate();
            } catch (e) { console.error(e); }
        }

        function spawnZombie() {
            if(!zombieBase || zombies.length > 10) return;
            const model = SkeletonUtils.clone(zombieBase);
            model.scale.set(1.5, 1.5, 1.5);
            
            const a = Math.random() * Math.PI * 2;
            model.position.set(player.position.x + Math.cos(a)*40, 0, player.position.z + Math.sin(a)*40);
            scene.add(model);
            
            const mixer = new THREE.AnimationMixer(model);
            const actions = {
                walk: mixer.clipAction(zombieAnims.find(an => an.name === 'Walk')),
                death: mixer.clipAction(zombieAnims.find(an => an.name === 'Dead'))
            };
            actions.walk.play();
            
            zombies.push({ model, mixer, actions, hp: 10, isDead: false });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!isReady) return;
            const delta = clock.getDelta();

            if(player) {
                // การเคลื่อนที่
                if(moveVec.length() > 0.1) {
                    player.position.addScaledVector(moveVec, stats.speed);
                    player.rotation.y = Math.atan2(moveVec.x, moveVec.z);
                    if(!playerActions.run?.isRunning()) { playerActions.idle?.stop(); playerActions.run?.play(); }
                } else {
                    if(!playerActions.idle?.isRunning()) { playerActions.run?.stop(); playerActions.idle?.play(); }
                }

                // กล้องติดตาม (Smooth Camera Follow)
                const camOffset = new THREE.Vector3(0, 8, 12);
                camera.position.lerp(player.position.clone().add(camOffset), 0.1);
                camera.lookAt(player.position);

                update(ref(db, 'players/' + PLAYER_ID), { x: player.position.x, z: player.position.z, ry: player.rotation.y });

                if(Date.now() - lastShot > 500) {
                    let target = null;
                    zombies.forEach(z => { if(!z.isDead && z.model.position.distanceTo(player.position) < 20) target = z.model; });
                    if(target) { shoot(target.position); lastShot = Date.now(); }
                }
            }

            if(playerMixer) playerMixer.update(delta);

            zombies.forEach((z, i) => {
                if(!z.isDead) {
                    // ซอมบี้วิ่งช้าๆ (Classic Slow Zombie)
                    const dir = new THREE.Vector3().subVectors(player.position, z.model.position).normalize();
                    z.model.position.addScaledVector(dir, 0.03); 
                    z.model.lookAt(player.position);
                    
                    if(z.model.position.distanceTo(player.position) < 1.2) {
                        stats.hp -= 0.5;
                        if(stats.hp <= 0) document.getElementById('game-over').style.display='block';
                    }
                }
                
                z.mixer.update(delta);

                bullets.forEach((b, bi) => {
                    if(!z.isDead && b.mesh.position.distanceTo(z.model.position) < 1.5) {
                        z.hp -= 5; b.life = 0;
                        if(z.hp <= 0) {
                            // เอนิเมชั่นตาย
                            z.isDead = true;
                            z.actions.walk.stop();
                            z.actions.death.setLoop(THREE.LoopOnce);
                            z.actions.death.clampWhenFinished = true;
                            z.actions.death.play();
                            stats.money += 10;
                            // ลบออกหลังจากเอนิเมชั่นจบ 2 วินาที
                            setTimeout(() => { scene.remove(z.model); zombies.splice(i,1); }, 2000);
                        }
                    }
                });
            });

            if(Math.random() < 0.01) spawnZombie();
            updateBullets();
            updateUI();
            renderer.render(scene, camera);
        }

        function shoot(targetPos) {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(player.position).y = 1.2;
            const dir = new THREE.Vector3().subVectors(targetPos, player.position).normalize();
            scene.add(b);
            bullets.push({ mesh: b, dir, life: 100 });
        }

        function startMultiplayerSync() {
            onValue(ref(db, 'players'), (snap) => {
                const data = snap.val();
                if(!data) return;
                document.getElementById('online-val').innerText = Object.keys(data).length;
                Object.keys(data).forEach(id => {
                    if(id === PLAYER_ID) return;
                    if(!otherPlayers[id]) {
                        const m = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), new THREE.MeshPhongMaterial({color:0xff007b}));
                        scene.add(m); otherPlayers[id] = m;
                    }
                    otherPlayers[id].position.lerp(new THREE.Vector3(data[id].x, 0, data[id].z), 0.2);
                });
            });
            onDisconnect(ref(db, 'players/' + PLAYER_ID)).remove();
        }

        function setupInput() {
            const keys = {};
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            setInterval(() => {
                let x = 0, z = 0;
                if(keys['KeyW']) z = -1; if(keys['KeyS']) z = 1;
                if(keys['KeyA']) x = -1; if(keys['KeyD']) x = 1;
                moveVec.set(x, 0, z).normalize();
            }, 10);
            nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'green' })
            .on('move', (e, d) => moveVec.set(Math.cos(d.angle.radian), 0, -Math.sin(d.angle.radian)))
            .on('end', () => moveVec.set(0,0,0));
        }

        function updateBullets() {
            for(let i=bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                b.mesh.position.addScaledVector(b.dir, 0.6); b.life--;
                if(b.life <= 0) { scene.remove(b.mesh); bullets.splice(i,1); }
            }
        }

        function updateUI() {
            document.getElementById('hp-fill').style.width = stats.hp + "%";
            document.getElementById('coin-val').innerText = stats.money;
        }

        clock = new THREE.Clock();
        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation spin สำหรับ Loading
        const style = document.createElement('style');
        style.innerHTML = `@keyframes spin { 100% { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
