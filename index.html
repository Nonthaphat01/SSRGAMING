<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Survivor 3D - Pro Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff007b; }
        body { margin: 0; overflow: hidden; font-family: 'Orbitron', sans-serif; background: #000; color: #fff; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hud { position: absolute; padding: 20px; pointer-events: auto; background: rgba(0,0,0,0.8); border: 1px solid var(--neon-blue); border-radius: 15px; box-shadow: 0 0 15px var(--neon-blue); }
        .top-left { top: 20px; left: 20px; }
        #hp-bar { width: 220px; height: 12px; background: #111; border: 1px solid var(--neon-blue); margin-top: 5px; border-radius: 6px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #0066ff, var(--neon-blue)); transition: 0.3s; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; pointer-events: auto; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 40px; border: 2px solid var(--neon-pink); text-align: center; display: none; pointer-events: auto; }
        .instruction { position: absolute; bottom: 20px; right: 20px; font-size: 10px; color: var(--neon-blue); opacity: 0.7; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div style="border: 5px solid #222; border-top: 5px solid var(--neon-blue); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 15px; letter-spacing: 3px;">INITIALIZING COMBAT ZONE...</p>
    </div>

    <div id="ui-layer">
        <div class="hud top-left">
            <div style="font-size: 10px; color: var(--neon-blue);">NANOBOT INTEGRITY</div>
            <div id="hp-bar"><div id="hp-fill"></div></div>
            <div style="margin-top:10px; font-size: 18px;">🪙 <span id="coin-val">0</span></div>
            <div style="font-size: 10px; margin-top:5px">USERS LINKED: <span id="online-val">1</span></div>
        </div>
        <div id="game-over" class="overlay">
            <h1 style="color:var(--neon-pink)">SYSTEM TERMINATED</h1>
            <button onclick="location.reload()" style="background:transparent; border:1px solid var(--neon-blue); color:white; padding:10px 20px; font-family:'Orbitron'; cursor:pointer;">RE-SYNC</button>
        </div>
        <div class="instruction">MOUSE L/R: ROTATE CAMERA | SCROLL: ZOOM | WASD: MOVE</div>
    </div>

    <div id="joystick-zone"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { SkeletonUtils } from 'three/addons/utils/SkeletonUtils.js'; // สำหรับ Clone โมเดลที่มี Animation
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyC1SLWvio-oYibt4pzY8xVZRErHAbMLqbk",
            authDomain: "ssr-zombie.firebaseapp.com",
            projectId: "ssr-zombie",
            storageBucket: "ssr-zombie.firebasestorage.app",
            messagingSenderId: "675922375054",
            appId: "1:675922375054:web:660c59fdf774f1e94c74df",
            databaseURL: "https://ssr-zombie-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const PLAYER_ID = "P_" + Math.floor(Math.random() * 9999);
        const MODEL_URLS = {
            player: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
            zombie: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Soldier.glb'
        };

        let scene, camera, renderer, clock, controls, player;
        let playerMixer, playerActions = {};
        let zombieBaseModel, zombieAnimations;
        let otherPlayers = {}, zombies = [], bullets = [];
        let moveVec = new THREE.Vector3();
        let stats = { hp: 100, money: 0, speed: 0.15 };
        let lastShot = 0;

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.FogExp2(0x020205, 0.04);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2.1; // กันกล้องมุดดิน

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const pointLight = new THREE.PointLight(0x00f2ff, 2, 50);
            pointLight.position.set(0, 10, 0);
            scene.add(pointLight);

            // พื้นแบบ Cyber Grid
            const grid = new THREE.GridHelper(200, 60, 0x00f2ff, 0x111111);
            scene.add(grid);

            const loader = new GLTFLoader();

            // Load Zombie Base Model (เพื่อเอามา Clone)
            const zombieData = await loader.loadAsync(MODEL_URLS.zombie);
            zombieBaseModel = zombieData.scene;
            zombieAnimations = zombieData.animations;

            // Load Player
            loader.load(MODEL_URLS.player, (gltf) => {
                player = gltf.scene;
                player.scale.set(0.4, 0.4, 0.4);
                player.traverse(n => { if(n.isMesh) n.castShadow = true; });
                scene.add(player);

                playerMixer = new THREE.AnimationMixer(player);
                gltf.animations.forEach(a => {
                    if(a.name === 'Idle') playerActions.idle = playerMixer.clipAction(a);
                    if(a.name === 'Running') playerActions.run = playerMixer.clipAction(a);
                });
                playerActions.idle?.play();

                document.getElementById('loading-screen').style.display = 'none';
                startSync();
                setupControls();
                animate();
            });
        }

        function spawnZombie() {
            if(!zombieBaseModel || zombies.length >= 8) return;

            const model = SkeletonUtils.clone(zombieBaseModel);
            model.scale.set(1.5, 1.5, 1.5);
            
            const angle = Math.random() * Math.PI * 2;
            const dist = 30;
            model.position.set(player.position.x + Math.cos(angle)*dist, 0, player.position.z + Math.sin(angle)*dist);
            
            scene.add(model);
            
            const mixer = new THREE.AnimationMixer(model);
            const walkAction = mixer.clipAction(zombieAnimations.find(a => a.name === 'Walk'));
            walkAction.play();

            zombies.push({ model, mixer, hp: 10 });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if(player) {
                // เคลื่อนที่ตามมุมมองกล้อง
                if(moveVec.length() > 0.1) {
                    const angle = Math.atan2(moveVec.x, moveVec.z) + camera.rotation.y;
                    const finalVec = new THREE.Vector3(Math.sin(angle), 0, Math.cos(angle));
                    player.position.addScaledVector(finalVec, stats.speed);
                    player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, angle, 0.1);

                    if(!playerActions.run?.isRunning()) { playerActions.idle?.stop(); playerActions.run?.play(); }
                } else {
                    if(!playerActions.idle?.isRunning()) { playerActions.run?.stop(); playerActions.idle?.play(); }
                }

                // กล้องตามตัวผู้เล่น
                controls.target.lerp(player.position, 0.1);
                controls.update();

                update(ref(db, 'players/' + PLAYER_ID), {
                    x: player.position.x, z: player.position.z, ry: player.rotation.y
                });

                // Auto Shooting
                if(Date.now() - lastShot > 400) {
                    let target = null;
                    zombies.forEach(z => { if(z.model.position.distanceTo(player.position) < 15) target = z.model; });
                    if(target) { shoot(target.position); lastShot = Date.now(); }
                }
            }

            if(playerMixer) playerMixer.update(delta);
            
            zombies.forEach((z, i) => {
                const dir = new THREE.Vector3().subVectors(player.position, z.model.position).normalize();
                z.model.position.addScaledVector(dir, 0.05);
                z.model.lookAt(player.position);
                z.mixer.update(delta);

                if(z.model.position.distanceTo(player.position) < 1.2) {
                    stats.hp -= 0.3;
                    if(stats.hp <= 0) document.getElementById('game-over').style.display='block';
                }

                bullets.forEach((b, bi) => {
                    if(b.mesh.position.distanceTo(z.model.position) < 1.5) {
                        z.hp -= 5; b.life = 0;
                        if(z.hp <= 0) { scene.remove(z.model); zombies.splice(i,1); stats.money += 10; }
                    }
                });
            });

            if(Math.random() < 0.01) spawnZombie();
            updateBullets();
            updateUI();
            renderer.render(scene, camera);
        }

        function shoot(targetPos) {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(player.position).y = 1.2;
            const dir = new THREE.Vector3().subVectors(targetPos, player.position).normalize();
            scene.add(b);
            bullets.push({ mesh: b, dir, life: 100 });
        }

        function startSync() {
            onValue(ref(db, 'players'), (snap) => {
                const data = snap.val();
                if(!data) return;
                document.getElementById('online-val').innerText = Object.keys(data).length;
                Object.keys(data).forEach(id => {
                    if(id === PLAYER_ID) return;
                    if(!otherPlayers[id]) {
                        const m = new THREE.Mesh(new THREE.BoxGeometry(1,2,1), new THREE.MeshPhongMaterial({color:0xff007b}));
                        scene.add(m); otherPlayers[id] = m;
                    }
                    otherPlayers[id].position.lerp(new THREE.Vector3(data[id].x, 0, data[id].z), 0.2);
                });
                Object.keys(otherPlayers).forEach(id => { if(!data[id]) { scene.remove(otherPlayers[id]); delete otherPlayers[id]; } });
            });
        }

        function setupControls() {
            const keys = {};
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            setInterval(() => {
                let x = 0, z = 0;
                if(keys['KeyW']) z = 1; if(keys['KeyS']) z = -1;
                if(keys['KeyA']) x = 1; if(keys['KeyD']) x = -1;
                moveVec.set(x, 0, z).normalize();
            }, 10);
            nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: 'cyan' })
            .on('move', (e, d) => moveVec.set(Math.sin(d.angle.radian), 0, Math.cos(d.angle.radian)))
            .on('end', () => moveVec.set(0,0,0));
        }

        function updateBullets() {
            for(let i=bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                b.mesh.position.addScaledVector(b.dir, 0.6); b.life--;
                if(b.life <= 0) { scene.remove(b.mesh); bullets.splice(i,1); }
            }
        }

        function updateUI() {
            document.getElementById('hp-fill').style.width = stats.hp + "%";
            document.getElementById('coin-val').innerText = stats.money;
        }

        clock = new THREE.Clock();
        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
